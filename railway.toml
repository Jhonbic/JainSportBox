# Configuración de despliegue del backend en Railway (Capa 3).
# Nixpacks instala las dependencias desde requirements.txt (en la raíz).
# El startCommand entra a backend/ porque la app importa módulos relativos
# (import models, from database import ...) y monta uvicorn ahí.

[build]
builder = "nixpacks"

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
